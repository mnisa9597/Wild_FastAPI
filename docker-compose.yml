version: '3'

services:
  fast_web:
    build: .
    command: uvicorn main:store_app --host 0.0.0.0 --port 8000
    volumes:
      - .:/store_app
      - static_volume:/store_app/static
      - media_volume:/store_app/media
    ports:
      - "8080:8000"
    depends_on:
      - fast_db

  fast_db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - static_volume:/store_app/static
      - media_volume:/store_app/media
    depends_on:
      - fast_web

volumes:
  postgres_data:
  static_volume:
  media_volume: